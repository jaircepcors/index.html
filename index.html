<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:black;
  display:flex;
  justify-content:center;
}

.container{
  position:relative;
  width:100%;
  max-width:400px; /* tamaño tipo celular */
}

img{
  width:100%;
  display:block;
}

/* BOTONES ENCIMA DE LA IMAGEN */
.boton{
  position:absolute;
  width:45%;
  height:18%;
}

/* posiciones exactas */
#btn1{ top:38%; left:5%; }
#btn2{ top:38%; right:5%; }
#btn3{ top:60%; left:5%; }
#btn4{ top:60%; right:5%; }

</style>
</head>

<body>

<div class="container">
  <img src="portada.png">

  <div id="btn1" class="boton" onclick="ir('entradas')"></div>
  <div id="btn2" class="boton" onclick="ir('hamburguesas')"></div>
  <div id="btn3" class="boton" onclick="ir('platos')"></div>
  <div id="btn4" class="boton" onclick="ir('bebidas')"></div>
</div>

<script>
function ir(seccion){
  if(seccion=="entradas") window.location="entradas.png";
  if(seccion=="hamburguesas") window.location="hamburguesas.png";
  if(seccion=="platos") window.location="platosfuertes.png";
  if(seccion=="bebidas") window.location="cócteles.png";
}
</script>

</body>
</html>
