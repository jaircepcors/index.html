<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:black;
  display:flex;
  justify-content:center;
}

.container{
  width:100%;
  max-width:400px;
  position:relative;
}

img{
  width:100%;
  display:none;
}

.activo{
  display:block;
}

/* BOTONES PORTADA */
.boton{
  position:absolute;
  width:45%;
  height:18%;
  z-index:2;
}

#e{ top:38%; left:5%; }
#h{ top:38%; right:5%; }
#p{ top:60%; left:5%; }
#b{ top:60%; right:5%; }

.oculto{
  display:none;
}

/* BOTÓN VOLVER */
.volver{
  position:absolute;
  top:10px;
  left:10px;
  background:orange;
  padding:8px 12px;
  border-radius:10px;
  z-index:10;
}

/* ZONAS BEBIDAS */
.zona{
  position:absolute;
  top:18%;
  width:18%;
  height:8%;
  z-index:5;
  display:none;
}

#z1{ left:2%; }
#z2{ left:21%; }
#z3{ left:40%; }
#z4{ left:59%; }
#z5{ left:78%; }

</style>
</head>

<body>

<div class="container">

  <!-- BOTÓN VOLVER -->
  <div class="volver" onclick="inicio()">⬅</div>

  <!-- IMÁGENES -->
  <img id="inicio" class="activo" src="portada.png">

  <img id="entradas" src="entradas.png">
  <img id="hamburguesas" src="hamburguesas.png">
  <img id="platos" src="platosfuertes.png">

  <img id="cerveza" src="cerveza.png">
  <img id="cocteles" src="cocteles.png">
  <img id="importados" src="importados.png">
  <img id="bebidassoft" src="bebidassoft.png">
  <img id="happyhours" src="happyhours.png">

  <!-- BOTONES PORTADA -->
  <div id="e" class="boton" onclick="abrir('entradas')"></div>
  <div id="h" class="boton" onclick="abrir('hamburguesas')"></div>
  <div id="p" class="boton" onclick="abrir('platos')"></div>
  <div id="b" class="boton" onclick="abrirBebidas()"></div>

  <!-- SUBMENÚ BEBIDAS SOBRE IMAGEN -->
  <div id="z1" class="zona" onclick="mostrarBebida('cerveza')"></div>
  <div id="z2" class="zona" onclick="mostrarBebida('cocteles')"></div>
  <div id="z3" class="zona" onclick="mostrarBebida('importados')"></div>
  <div id="z4" class="zona" onclick="mostrarBebida('bebidassoft')"></div>
  <div id="z5" class="zona" onclick="mostrarBebida('happyhours')"></div>

</div>

<script>

function abrir(seccion){
  ocultarTodo();
  document.getElementById(seccion).classList.add("activo");
  ocultarBotones();
  ocultarZonas();
}

function abrirBebidas(){
  ocultarTodo();
  document.getElementById("cocteles").classList.add("activo");
  ocultarBotones();
  mostrarZonas();
}

function mostrarBebida(tipo){
  ocultarTodo();
  document.getElementById(tipo).classList.add("activo");
  mostrarZonas();
}

function inicio(){
  ocultarTodo();
  document.getElementById("inicio").classList.add("activo");

  document.querySelectorAll('.boton').forEach(b=>{
    b.classList.remove("oculto");
  });

  ocultarZonas();
}

function ocultarTodo(){
  document.querySelectorAll("img").forEach(img=>{
    img.classList.remove("activo");
  });
}

function ocultarBotones(){
  document.querySelectorAll('.boton').forEach(b=>{
    b.classList.add("oculto");
  });
}

function mostrarZonas(){
  document.querySelectorAll('.zona').forEach(z=>{
    z.style.display="block";
  });
}

function ocultarZonas(){
  document.querySelectorAll('.zona').forEach(z=>{
    z.style.display="none";
  });
}

</script>

</body>
</html>
