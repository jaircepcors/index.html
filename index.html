<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:black;
  text-align:center;
}

.seccion{
  display:none;
}

.activa{
  display:block;
}

img{
  width:100%;
  max-width:500px;
}

/* zonas clickeables invisibles */
.boton{
  position:absolute;
  left:0;
  width:100%;
  height:80px;
}
</style>
</head>

<body>

<!-- PORTADA -->
<div id="inicio" class="seccion activa">
  <img src="portada.png">
  <div class="boton" style="top:300px;" onclick="ir('entradas')"></div>
  <div class="boton" style="top:400px;" onclick="ir('hamburguesas')"></div>
  <div class="boton" style="top:500px;" onclick="ir('platos')"></div>
  <div class="boton" style="top:600px;" onclick="ir('bebidas')"></div>
</div>

<!-- ENTRADAS -->
<div id="entradas" class="seccion">
  <img src="entradas.png">
  <div class="boton" style="top:50px;" onclick="ir('inicio')"></div>
</div>

<!-- BURGERS -->
<div id="hamburguesas" class="seccion">
  <img src="hamburguesas.png">
  <div class="boton" style="top:50px;" onclick="ir('inicio')"></div>
</div>

<!-- PLATOS -->
<div id="platos" class="seccion">
  <img src="platosfuertes.png">
  <div class="boton" style="top:50px;" onclick="ir('inicio')"></div>
</div>

<!-- BEBIDAS -->
<div id="bebidas" class="seccion">
  <img src="cócteles.png">
  <div class="boton" style="top:50px;" onclick="ir('inicio')"></div>

  <!-- subcategorías -->
  <div class="boton" style="top:250px;" onclick="mostrarBebida('cerveza')"></div>
  <div class="boton" style="top:300px;" onclick="mostrarBebida('cocteles')"></div>
  <div class="boton" style="top:350px;" onclick="mostrarBebida('importados')"></div>
  <div class="boton" style="top:400px;" onclick="mostrarBebida('bebidassoft')"></div>
  <div class="boton" style="top:450px;" onclick="mostrarBebida('happyhours')"></div>
</div>

<!-- IMAGEN DINÁMICA BEBIDAS -->
<div id="subbebida" class="seccion">
  <img id="imgBebida">
  <div class="boton" style="top:50px;" onclick="ir('bebidas')"></div>
</div>

<script>
function ir(seccion){
  document.querySelectorAll('.seccion').forEach(s=>s.classList.remove('activa'));
  document.getElementById(seccion).classList.add('activa');
}

function mostrarBebida(tipo){
  let img = document.getElementById('imgBebida');

  if(tipo=="cerveza") img.src="cerveza.png";
  if(tipo=="cocteles") img.src="cócteles.png";
  if(tipo=="importados") img.src="importados.png";
  if(tipo=="bebidassoft") img.src="bebidassoft.png";
  if(tipo=="happyhours") img.src="happyhours.png";

  ir('subbebida');
}
</script>

</body>
</html>
