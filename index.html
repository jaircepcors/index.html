<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Birra Menu</title>
<style>
body {font-family: Arial; background:#0b0b0b; color:#fff; text-align:center;}
.container {padding:20px;}
.button {display:block; margin:10px auto; padding:15px; width:80%; max-width:300px; border:2px solid orange; border-radius:10px; color:white; text-decoration:none;}
img {width:90%; max-width:500px; margin-top:20px; border-radius:10px;}
.hidden {display:none;}
.lang {position:fixed; top:10px; right:10px;}
.lang button {margin:5px; padding:8px;}
</style>
</head>
<body>

<div class="lang">
<button onclick="setLang('en')">EN</button>
<button onclick="setLang('es')">ES</button>
</div>

<div class="container" id="home">
<h1>LA BIRRA MENU</h1>
<a class="button" onclick="show('starters')" data-en="STARTERS" data-es="ENTRADAS">STARTERS</a>
<a class="button" onclick="show('burgers')" data-en="BURGERS" data-es="HAMBURGUESAS">BURGERS</a>
<a class="button" onclick="show('main')" data-en="MAIN PLATES" data-es="PLATOS FUERTES">MAIN PLATES</a>
<a class="button" onclick="show('drinks')" data-en="DRINKS" data-es="BEBIDAS">DRINKS</a>
</div>

<div class="container hidden" id="starters">
<h2 data-en="STARTERS" data-es="ENTRADAS">STARTERS</h2>
<img src="starters.jpg">
<a class="button" onclick="back()" data-en="BACK" data-es="VOLVER">BACK</a>
</div>

<div class="container hidden" id="burgers">
<h2 data-en="BURGERS" data-es="HAMBURGUESAS">BURGERS</h2>
<img src="burgers.jpg">
<a class="button" onclick="back()" data-en="BACK" data-es="VOLVER">BACK</a>
</div>

<div class="container hidden" id="main">
<h2 data-en="MAIN PLATES" data-es="PLATOS FUERTES">MAIN PLATES</h2>
<img src="main.jpg">
<a class="button" onclick="back()" data-en="BACK" data-es="VOLVER">BACK</a>
</div>

<div class="container hidden" id="drinks">
<h2 data-en="DRINKS" data-es="BEBIDAS">DRINKS</h2>
<a class="button" onclick="show('beers')" data-en="BEERS" data-es="CERVEZAS">BEERS</a>
<a class="button" onclick="show('cocktails')" data-en="COCKTAILS" data-es="CÓCTELES">COCKTAILS</a>
<a class="button" onclick="show('soft')" data-en="SOFT DRINKS" data-es="BEBIDAS SIN ALCOHOL">SOFT DRINKS</a>
<a class="button" onclick="show('happy')" data-en="HAPPY HOURS" data-es="HAPPY HOUR">HAPPY HOURS</a>
<a class="button" onclick="back()" data-en="BACK" data-es="VOLVER">BACK</a>
</div>

<div class="container hidden" id="beers">
<h2 data-en="BEERS" data-es="CERVEZAS">BEERS</h2>
<img src="beers.jpg">
<a class="button" onclick="backToDrinks()" data-en="BACK" data-es="VOLVER">BACK</a>
</div>

<div class="container hidden" id="cocktails">
<h2 data-en="COCKTAILS" data-es="CÓCTELES">COCKTAILS</h2>
<img src="cocktails.jpg">
<a class="button" onclick="backToDrinks()" data-en="BACK" data-es="VOLVER">BACK</a>
</div>

<div class="container hidden" id="soft">
<h2 data-en="SOFT DRINKS" data-es="BEBIDAS SIN ALCOHOL">SOFT DRINKS</h2>
<img src="soft.jpg">
<a class="button" onclick="backToDrinks()" data-en="BACK" data-es="VOLVER">BACK</a>
</div>

<div class="container hidden" id="happy">
<h2 data-en="HAPPY HOURS" data-es="HAPPY HOUR">HAPPY HOURS</h2>
<img src="happy.jpg">
<a class="button" onclick="backToDrinks()" data-en="BACK" data-es="VOLVER">BACK</a>
</div>

<script>
let currentLang = 'en';

function setLang(lang){
 currentLang = lang;
 document.querySelectorAll('[data-en]').forEach(el=>{
   el.textContent = el.getAttribute('data-' + lang);
 });
}

function show(id){
 document.querySelectorAll('.container').forEach(e=>e.classList.add('hidden'));
 document.getElementById(id).classList.remove('hidden');
}

function back(){ show('home'); }
function backToDrinks(){ show('drinks'); }
</script>

</body>
</html>
