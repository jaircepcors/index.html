<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:black;
  text-align:center;
  font-family:Arial;
}

.seccion{
  display:none;
}

.activa{
  display:block;
}

img{
  width:100%;
  max-width:500px;
}

/* BOTONES REALES */
.menu{
  display:flex;
  flex-direction:column;
  gap:10px;
  padding:20px;
}

.btn{
  background:#ff6a00;
  color:white;
  padding:15px;
  border-radius:10px;
  font-size:18px;
  border:none;
}

.volver{
  margin-top:10px;
  background:#333;
}
</style>
</head>

<body>

<!-- INICIO -->
<div id="inicio" class="seccion activa">
  <img src="portada.png">

  <div class="menu">
    <button class="btn" onclick="ir('entradas')">Entradas</button>
    <button class="btn" onclick="ir('hamburguesas')">Burgers</button>
    <button class="btn" onclick="ir('platos')">Platos Fuertes</button>
    <button class="btn" onclick="ir('bebidas')">Bebidas</button>
  </div>
</div>

<!-- ENTRADAS -->
<div id="entradas" class="seccion">
  <img src="entradas.png">
  <button class="btn volver" onclick="ir('inicio')">⬅ Volver</button>
</div>

<!-- BURGERS -->
<div id="hamburguesas" class="seccion">
  <img src="hamburguesas.png">
  <button class="btn volver" onclick="ir('inicio')">⬅ Volver</button>
</div>

<!-- PLATOS -->
<div id="platos" class="seccion">
  <img src="platosfuertes.png">
  <button class="btn volver" onclick="ir('inicio')">⬅ Volver</button>
</div>

<!-- BEBIDAS -->
<div id="bebidas" class="seccion">
  <img src="cócteles.png">

  <div class="menu">
    <button class="btn" onclick="mostrar('cerveza.png')">Cervezas</button>
    <button class="btn" onclick="mostrar('cócteles.png')">Cócteles</button>
    <button class="btn" onclick="mostrar('importados.png')">Importados</button>
    <button class="btn" onclick="mostrar('bebidassoft.png')">Bebidas Soft</button>
    <button class="btn" onclick="mostrar('happyhours.png')">Happy Hours</button>
  </div>

  <button class="btn volver" onclick="ir('inicio')">⬅ Volver</button>
</div>

<!-- SUB BEBIDA -->
<div id="sub" class="seccion">
  <img id="imgSub">
  <button class="btn volver" onclick="ir('bebidas')">⬅ Volver</button>
</div>

<script>
function ir(seccion){
  document.querySelectorAll('.seccion').forEach(s=>s.classList.remove('activa'));
  document.getElementById(seccion).classList.add('activa');
}

function mostrar(img){
  document.getElementById('imgSub').src = img;
  ir('sub');
}
</script>

</body>
</html>
