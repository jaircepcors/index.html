<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:black;
  display:flex;
  justify-content:center;
}

.container{
  width:100%;
  max-width:400px;
  position:relative;
}

img{
  width:100%;
  display:none;
}

.activo{
  display:block;
}

/* botones invisibles SOLO portada */
.boton{
  position:absolute;
  width:45%;
  height:18%;
  z-index:2;
}

/* posiciones */
#e{ top:38%; left:5%; }
#h{ top:38%; right:5%; }
#p{ top:60%; left:5%; }
#b{ top:60%; right:5%; }

/* ocultar botones cuando no es portada */
.oculto{
  display:none;
}

/* botón volver */
.volver{
  position:absolute;
  top:10px;
  left:10px;
  background:orange;
  padding:8px 12px;
  border-radius:10px;
  font-size:14px;
  z-index:10; /* 🔥 clave */
}

/* idioma */
.idioma{
  position:absolute;
  top:10px;
  right:10px;
  z-index:10;
}
</style>
</head>

<body>

<div class="container">

  <!-- idioma -->
  <div class="idioma">
    <button onclick="cambiarIdioma('es')">ES</button>
    <button onclick="cambiarIdioma('en')">EN</button>
  </div>

  <!-- volver -->
  <div class="volver" onclick="inicio()">⬅</div>

  <!-- imágenes -->
  <img id="inicio" class="activo" src="portada.png">
  <img id="entradas" src="entradas.png">
  <img id="hamburguesas" src="hamburguesas.png">
  <img id="platos" src="platosfuertes.png">
  <img id="bebidas" src="cocteles.png">

  <!-- botones portada -->
  <div id="e" class="boton" onclick="abrir('entradas')"></div>
  <div id="h" class="boton" onclick="abrir('hamburguesas')"></div>
  <div id="p" class="boton" onclick="abrir('platos')"></div>
  <div id="b" class="boton" onclick="abrir('bebidas')"></div>

</div>

<script>

function abrir(seccion){
  ocultarTodo();
  document.getElementById(seccion).classList.add("activo");

  // ocultar botones de portada
  document.querySelectorAll('.boton').forEach(b=>{
    b.classList.add("oculto");
  });
}

function inicio(){
  ocultarTodo();
  document.getElementById("inicio").classList.add("activo");

  // mostrar botones otra vez
  document.querySelectorAll('.boton').forEach(b=>{
    b.classList.remove("oculto");
  });
}

function ocultarTodo(){
  document.querySelectorAll("img").forEach(img=>{
    img.classList.remove("activo");
  });
}

/* idioma */
function cambiarIdioma(idioma){

  if(idioma=="es"){
    document.getElementById("entradas").src="entradas.png";
    document.getElementById("hamburguesas").src="hamburguesas.png";
    document.getElementById("platos").src="platosfuertes.png";
    document.getElementById("bebidas").src="cocteles.png";
  }

  if(idioma=="en"){
    document.getElementById("entradas").src="starters.png";
    document.getElementById("hamburguesas").src="burgers.png";
    document.getElementById("platos").src="mainplates.png";
    document.getElementById("bebidas").src="drinks.png";
  }
}

</script>

</body>
</html>
